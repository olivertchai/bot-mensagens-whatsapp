version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: whatsapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Serviço em Go (whatsmeow)
  go-whatsapp:
    build:
      context: ./go-whatsapp
      dockerfile: Dockerfile
    container_name: whatsapp_go_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secretpassword
      - DB_NAME=whatsapp
    depends_on:
      - db

  # 3. Aplicação Laravel (PHP 8.3 + Apache)
  laravel-app:
    build:
      context: ./laravel-app
      dockerfile: Dockerfile
    container_name: whatsapp_laravel
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel-app:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=whatsapp
      - DB_USERNAME=admin
      - DB_PASSWORD=secretpassword
    depends_on:
      - db
    # Comando para ajustar permissões, apontar o Apache para a pasta public e iniciar o servidor
# Comando para ajustar permissões, executar migrações, apontar o Apache para a pasta public e iniciar o servidor
    command: >
      bash -c "mkdir -p /var/www/html/storage/framework/views /var/www/html/storage/framework/cache /var/www/html/storage/framework/sessions
      && chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
      && chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache
      && sed -i 's!/var/www/html!/var/www/html/public!g' /etc/apache2/sites-available/000-default.conf
      && php artisan migrate --force
      && docker-php-entrypoint apache2-foreground"
# Persistência de dados do banco
volumes:
  postgres_data: